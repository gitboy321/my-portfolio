<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { padding: 2rem; }
    .logo { width: 80px; margin-bottom: 2rem; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(204,0,0,0.5)); }
      50% { transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(204,0,0,0.8)); }
    }
    h1 { font-size: 8rem; font-weight: 800; color: #cc0000; line-height: 1; }
    h2 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0; }
    p { color: #888888; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: #cc0000;
      color: #ffffff;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    a:hover { background: #ff0000; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(204,0,0,0.4); }
  </style>
</head>
<body>
  <div class="container">
    <img src="Photos/Bklogo.png" alt="BK Logo" class="logo" />
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Looks like this page doesn't exist.<br>Let's get you back home!</p>
    <a href="/my-portfolio">← Back to Portfolio</a>
  </div>
</body>
</html>
